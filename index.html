<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Todo List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Todo List</h1>
        
        <div class="add-todo">
            <input type="text" id="newTodoInput" placeholder="Enter a new todo">
            <button id="addTodoBtn">Add Todo</button>
        </div>

        <div class="filter-buttons">
            <button id="showAllBtn" class="active">All</button>
            <button id="showCompletedBtn">Completed</button>
            <button id="showActiveBtn">Not Completed</button>
        </div>

        <ul id="todoList" class="todo-list"></ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
